<!DOCTYPE html>
<html>

<head>
    <title>Hóspedes</title>
</head>

<body>

    <h1>Lista de Hóspedes</h1>

    <br>
    <a href="/">
        Voltar
    </a>

    <br>

    <hr>

    <a href="/add_hospede">
        Novo Hóspede
    </a>
    <hr>
    <a href="/update_hospede">
        Atualizar Hóspede
    </a>
    <hr>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>CPF</th>
            <th>Ações</th>
        </tr>

        {% for hospede in hospedes %}
        <tr>
            <td>{{ hospede.id }}</td>
            <td>{{ hospede.nome }}</td>
            <td>{{ hospede.email }}</td>
            <td>{{ hospede.telefone }}</td>
            <td>{{ hospede.cpf }}</td>
            <td>

                <a href="/delete_hospede/{{ hospede.id }}"
                    onclick="return confirm('Tem certeza que deseja excluir este hóspede?')">
                    Excluir
                </a>

            </td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
