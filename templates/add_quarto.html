{% extends "base.html" %}

{% block title %}
Adicionar Quarto
{% endblock %}

{% block page_title %}
Novo Quarto
{% endblock %}

{% block content %}

{% if erro %}

<div class="mensagem-erro">
    {{ erro }}
</div>

{% endif %}


<form method="POST">

    <label>Número do Quarto</label>

    <input type="number" name="numero" placeholder="Digite o número do quarto" required>

    <label>Tipo</label>

    <input type="text" name="tipo" placeholder="Ex: Luxo, Standard, Premium..." required>

    <label>Valor da Diária</label>

    <input type="number" step="0.01" name="valor_diaria" placeholder="Digite o valor da diária" required>

    <label>Status</label>

    <select name="status" required>

        <option value="Disponível">
            Disponível
        </option>

        <option value="Ocupado">
            Ocupado
        </option>

        <option value="Manutenção">
            Manutenção
        </option>

    </select>

    <button type="submit" class="btn btn-add">

        Cadastrar Quarto

    </button>

</form>

{% endblock %}
