<!DOCTYPE html>
<html>

<head>
    <title>Deletar Quarto</title>
</head>

<body>

    <h1>Excluir Quarto</h1>

    <form method="POST">

        <input type="number" name="id" placeholder="id">

        <br><br>
        {% for quarto in quartos %}

        <p>
            {{ quarto.id }}
            -
            Quarto {{ quarto.numero }}
        </p>

        {% endfor %}

        <hr><br>

        <button type="submit">
            Excluir
        </button>

    </form>

</body>

</html>
